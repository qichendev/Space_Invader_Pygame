name: Build and Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups
        env:
          UV_PROJECT_ENVIRONMENT: /tmp/venv

      - name: Build with Pygbag
        run: |
          /tmp/venv/bin/pygbag --disable-sound-format-error . &
          PYGBAG_PID=$!
          echo "Waiting for build/web/index.html..."
          for i in $(seq 1 30); do
            if [ -f "build/web/index.html" ]; then
              echo "Build complete after $((i * 3))s"
              break
            fi
            sleep 3
          done
          kill $PYGBAG_PID 2>/dev/null || true
          if [ ! -f "build/web/index.html" ]; then
            echo "ERROR: build/web/index.html was not generated"
            exit 1
          fi
          # Auto-start the game without requiring a click on the run button
          sed -i 's/autorun : 0/autorun : 1/g' build/web/index.html
          # Remove "snd" from data-os so Pygbag does not wait for audio WASM
          # (audio requires a user gesture to load; without this, embed.counter()
          #  stays negative forever and Python never starts)
          sed -i 's/data-os="vtx,snd,gui"/data-os="vtx,gui"/' build/web/index.html
          # Bypass the embed.counter() WASM module wait loop (blocks on audio without user gesture)
          sed -i 's/while embed.counter()<0:/if False:  # patched: skip WASM module wait/' build/web/index.html
          # Bypass the MM.UME media-engagement wait loop in site.py
          sed -i 's/if not platform.window.MM.UME:/platform.window.MM.UME = True  # patched\n    if not platform.window.MM.UME:/' build/web/index.html
          # Repack the game archive excluding .venv (pygbag bundles the entire project
          # directory including the local .venv, inflating the archive from ~1MB to 19MB
          # and causing the browser to hang while WASM-Python extracts hundreds of files).
          cd build/web
          mkdir -p /tmp/repack
          tar -xzf space_invader_pygame.tar.gz -C /tmp/repack
          rm -rf /tmp/repack/assets/.venv
          tar -czf space_invader_pygame.tar.gz -C /tmp/repack .
          echo "Repacked archive size: $(du -sh space_invader_pygame.tar.gz | cut -f1)"
          cd ../..
          # Inject a fetch progress tracker (progress.js is committed to the repo).
          cp progress.js build/web/progress.js
          sed -i 's|</head>|<script src="progress.js"></script></head>|' build/web/index.html
          echo "Progress bar script injected."
          # Download BrowserFS from unpkg (pygame-web CDN returns 404 for this file).
          # Self-hosting also avoids ORB blocking on cross-origin opaque responses.
          curl -sL "https://unpkg.com/browserfs@2.0.0/dist/browserfs.min.js" \
               -o build/web/browserfs.min.js
          sed -i 's|https://pygame-web.github.io/cdn/0.9.3//browserfs.min.js|browserfs.min.js|g' \
               build/web/index.html
          # Copy Azure config for WASM headers and MIME types
          cp staticwebapp.config.json build/web/staticwebapp.config.json
          echo "Build artifacts:"
          ls -lh build/web/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: build/web
          skip_app_build: true

  close_pull_request:
    name: Close Pull Request Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
